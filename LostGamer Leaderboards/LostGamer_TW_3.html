                    if(!userMap[u])userMap[u]=[]; if(!globalMedals[u])globalMedals[u]={1:0,2:0,3:0};
                    if(r>=1&&r<=3)globalMedals[u][r]++;
                    userMap[u].push({rounds:rCount,mode:mUpper,modeIdx:modeWeights[mUpper]||0,rank:r,score:s,maxScore:maxS,acc:(s/maxS)*100,avg:t/rCount,time:t,dateVal:e.completedAt?new Date(e.completedAt).getTime():0,dateStr:e.completedAt});
                });
            }
        }

        function updateTable() {
            const r=document.getElementById('roundSelect').value, m=document.getElementById('modeSelect').value;
            const entries=rawData[r+"_"+m]||[], tbody=document.getElementById('leaderboardBody');
            tbody.innerHTML="";
            entries.forEach(e=>{
                const row=document.createElement('tr'); row.className="hover:bg-blue-500/5 transition-colors text-sm";
                const medals=globalMedals[e.username]||{1:0,2:0,3:0};
                
                let mH=""; 
                if(medals[1]>0) mH+=`<span class="text-yellow-500 ml-2 font-bold">🥇${medals[1]}</span>`; 
                if(medals[2]>0) mH+=`<span class="text-slate-300 ml-2 font-bold">🥈${medals[2]}</span>`; 
                if(medals[3]>0) mH+=`<span class="text-amber-700 ml-2 font-bold">🥉${medals[3]}</span>`;
                
                const maxS=parseInt(r)*5000, acc=(e.score/maxS)*100;
                
                row.innerHTML=`<td class="p-4">${getRankHTML(e.position)}</td>
                    <td class="p-4 font-bold flex items-center"><span class="user-link" onclick="showUserStats('${e.username.replace(/'/g,"\'")}')">${e.username}</span><span class="text-xs ml-1 flex">${mH}</span></td>
                    <td class="p-4 text-center font-mono">${getScoreHTML(e.score, maxS)}</td>
                    <td class="p-4 text-center font-mono">${getAccHTML(acc)}</td>
                    <td class="p-4 text-center font-mono text-slate-400 text-xs">${formatDuration(e.duration/parseInt(r))}</td>
                    <td class="p-4 text-slate-400 font-mono">${formatDuration(e.duration)}</td>
                    <td class="p-4 text-slate-500 text-xs">${formatDate(e.completedAt)}</td>`;
                tbody.appendChild(row);
            });
        }

        function showUserStats(u) {
            currentModalUser=u; window.location.hash = u; modalSortCol="rounds"; modalSortDir=1;
            const s=userMap[u]||[];
            let sumRank=0,totalT=0,totalR=0; s.forEach(x=>{sumRank+=x.rank;totalT+=x.time;totalR+=x.rounds});
            const medals=globalMedals[u];
            document.getElementById('modalUsername').innerText=u;
            document.getElementById('modalBadgeContainer').innerHTML=`
                ${medals[1]?`<div class="stat-badge text-yellow-500">🥇 ${medals[1]} WRs</div>`:''}
                ${medals[2]?`<div class="stat-badge text-slate-300">🥈 ${medals[2]}</div>`:''}
                ${medals[3]?`<div class="stat-badge text-amber-700">🥉 ${medals[3]}</div>`:''}
                <div class="stat-badge">Avg Rank: #${s.length?(sumRank/s.length).toFixed(1):0}</div>
                <div class="stat-badge">Avg Time/Rnd: ${totalR?formatDuration(totalT/totalR):"0:00"}</div>
            `;
            renderModalTable(); document.getElementById('userModal').classList.remove('hidden');
        }
        
        function closeModal() { document.getElementById('userModal').classList.add('hidden'); history.pushState("", document.title, window.location.pathname + window.location.search); }
        function sortModal(c) { if(modalSortCol===c)modalSortDir*=-1; else{modalSortCol=c;modalSortDir=1;} renderModalTable(); }
        
        function renderModalTable() {
            const s=[...userMap[currentModalUser]].sort((a,b)=>{
                let d=0;
                if(modalSortCol==="rounds") d=(a.rounds-b.rounds)||(a.modeIdx-b.modeIdx);
                else if(modalSortCol==="mode") d=a.modeIdx-b.modeIdx;
                else if(modalSortCol==="rank") d=a.rank-b.rank;
                else if(modalSortCol==="score") d=a.score-b.score;
                else if(modalSortCol==="date") d=a.dateVal-b.dateVal;
                else d=a[modalSortCol]-b[modalSortCol];
                return d*modalSortDir;
            });
            const mb=document.getElementById('modalStatsBody'); mb.innerHTML="";
            s.forEach(i=>{
                const tr=document.createElement('tr'); tr.className="border-b border-white/5 hover:bg-white/5 transition-colors";
                tr.innerHTML=`
                    <td class="py-4 px-4 text-slate-300 font-bold">${i.rounds}R</td>
                    <td class="py-4 px-4 text-xs">${getModeHTML(i.mode)}</td>
                    <td class="py-4 px-4">${getRankHTML(i.rank)}</td>
                    <td class="py-4 px-4 text-center">${getScoreHTML(i.score, i.maxScore)}</td>
                    <td class="py-4 px-4 text-center">${getAccHTML(i.acc)}</td>
                    <td class="py-4 px-4 text-center text-xs text-slate-400">${formatDuration(i.avg)}</td>
                    <td class="py-4 px-4 text-xs text-slate-400">${formatDuration(i.time)}</td>
                    <td class="py-4 px-4 text-xs text-slate-500">${formatDate(i.dateStr)}</td>`;
                mb.appendChild(tr);
            });
            ['rounds','mode','rank','score','acc','avg','time','date'].forEach(c=>{
                document.getElementById('sort-'+c).innerText=(c===modalSortCol)?(modalSortDir===1?' ▲':' ▼'):'';
            });
        }

        window.onclick=e=>{if(e.target.id==='userModal')closeModal();};
        indexUsers(); updateTable(); const h = decodeURIComponent(window.location.hash.substring(1)); if(h && userMap[h]) showUserStats(h);
    </script>
</body>
</html>
